apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx

spec:
  replicas: "3"   # ERROR 1: replicas should be integer, not string

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: web   # ERROR 2: label does not match selector

    spec:
      containers:
      - name: nginx
        image: nginx:lates   # ERROR 3: wrong image tag

        ports:
        - containerPort: "80"   # ERROR 4: port should be integer

        resources:
          limits:
            cpu: "500m"
            memory: "128Mi"

        volumeMounts:
        - name: nginx-storage
          mountPath: /usr/share/nginx/html

      volumes:
      - name: nginx-storage
        persistentVolumeClaim:
          claimName: nginx-pvc   # ERROR 5: PVC may not exist

          
